
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack Pro</title>
    <script src="auth.js"></script>
    <script>
        // false = this is a public page
        checkAuth(false);
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to FinTrack Pro</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        // Use the new function from auth.js
        const attempt = loginUser(username, password);

        if (attempt.success) {
            window.location.replace('index.html');
        } else {
            alert(attempt.message);
        }
    });
</script>
</body>
</html>
