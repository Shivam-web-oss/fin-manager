
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinTrack Pro</title>
    <script src="auth.js"></script>
    <script>
        // false = this is a public page
        checkAuth(false);
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join FinTrack Pro</p>
        <form id="registerForm">
            <div class="form-group">
                <label>Choose a Username</label>
                <input type="text" id="regUsername" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-register">Register</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;

        // Use the new function from auth.js
        const attempt = registerUser(username, password, '$');

        if (attempt.success) {
            alert(attempt.message);
            window.location.href = 'login.html'; // Send them to login after registering
        } else {
            alert(attempt.message); // Shows "Username already exists"
        }
    });
</script>
</body>
</html>
